<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Outpost logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7469F2"/>
      <stop offset="1" stop-color="#9D63EE"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="60" fill="url(#bg)"/>
