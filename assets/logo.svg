    <path d="M90 122 A44 44 0 0 1 134 166" opacity="0.95"/>
    <path d="M90 88 A78 78 0 0 1 168 166" opacity="0.70"/>
    <path d="M90 54 A112 112 0 0 1 202 166" opacity="0.45"/>
  </g>
  <circle cx="90" cy="166" r="15" fill="#FFFFFF"/>
</svg>
