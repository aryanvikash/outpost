name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: agent/go.sum
      - run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - run: go test -race ./...
      - name: cross-compile
        run: |
          for t in linux/amd64 linux/arm64; do
            GOOS=${t%/*} GOARCH=${t#*/} go build -o /dev/null ./cmd/outpost-agent
          done

  control-plane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: control-plane/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
